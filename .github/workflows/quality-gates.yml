name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (0 errors required)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npx prettier --check .

      - name: Security audit (prod deps only)
        run: npm audit --omit=dev

      - name: Full test suite
        run: npm test

      - name: Harness gate (16/16 required)
        run: node bin/vibe.js harness
